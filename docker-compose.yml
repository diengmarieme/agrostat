version: "3.8"

services:

  mysql:
    image: mysql:8.0
    container_name: agrostat_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: agrostat2026
      MYSQL_DATABASE: agrostat
      MYSQL_USER: agrouser
      MYSQL_PASSWORD: agropass2026
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - agrostat_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pagrostat2026"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:6.0
    container_name: agrostat_mongodb
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - agrostat_network

  app:
    build: .
    container_name: agrostat_app
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_started
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=agrouser
      - MYSQL_PASSWORD=agropass2026
      - MYSQL_DB=agrostat
      - MONGO_URI=mongodb://agrostat_mongodb:27017
      - JWT_SECRET=agrostat-jwt-secret-2026
    networks:
      - agrostat_network

  web:
    image: nginx:alpine
    container_name: agrostat_web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - agrostat_network

volumes:
  mysql_data:
  mongo_data:

networks:
  agrostat_network:
    driver: bridge
